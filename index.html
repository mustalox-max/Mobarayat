<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MOBARAYAT - ELITE</title>
    <style>
        :root { --black: #000; --yellow: #ffff00; --green: #2ecc71; --blue: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; margin: 0; padding: 10px; text-align: center; }
        .header { background: #000; color: #fff; padding: 25px; border-bottom: 8px solid var(--yellow); margin-bottom: 20px; }
        .nav-tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; direction: ltr; }
        .tab-btn { flex: 1; border: 3px solid #000; background: #fff; padding: 15px; font-weight: 900; cursor: pointer; }
        .tab-btn.active { background: #000; color: #fff; }
        .match-card { background: #fff; border: 4px solid #000; margin-bottom: 20px; text-align: center; }
        .league-tag { background: #000; color: #fff; padding: 5px; font-size: 0.8rem; display: block; }
        .score { font-size: 4rem; font-weight: 900; padding: 10px; border-top: 1px solid #eee; }
        .pred-bar { background: var(--yellow); display: flex; border-top: 4px solid #000; direction: ltr; }
        .pred-item { flex: 1; padding: 10px; border-right: 2px solid #000; font-weight: 900; }
        .pred-item:last-child { border-right: none; }
        .loading { padding: 50px; font-weight: bold; font-size: 1.2rem; color: #555; }
    </style>
</head>
<body>

    <div class="header"><h1>MOBARAYAT</h1></div>

    <div class="nav-tabs">
        <button class="tab-btn" onclick="fetchMatches(-1, this)">YESTERDAY</button>
        <button class="tab-btn active" onclick="fetchMatches(0, this)">TODAY</button>
        <button class="tab-btn" onclick="fetchMatches(1, this)">TOMORROW</button>
    </div>

    <div id="results"></div>

<script>
    const API_KEY = "9547307bf1814e4ca4ec0da0a007b606";
    // معرفات الدوريات الكبرى والبطولات الأوروبية
    const TARGET_LEAGUES = ['PL', 'PD', 'BL1', 'SA', 'FL1', 'DED', 'BSA', 'PPL', 'CL', 'EL', 'EC'];

    async function fetchMatches(offset, btn) {
        const container = document.getElementById('results');
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const d = new Date();
        d.setDate(d.getDate() + offset);
        const dateStr = d.toISOString().split('T')[0];

        container.innerHTML = '<div class="loading">جاري تحديث قائمة المباريات...</div>';

        // محاولة استخدام وسيط كوري أسرع (corsproxy.io)
        const targetUrl = `https://api.football-data.org/v4/matches?dateFrom=${dateStr}&dateTo=${dateStr}`;
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

        try {
            const response = await fetch(proxyUrl, {
                headers: { 'X-Auth-Token': API_KEY }
            });
            const data = await response.json();

            if (data.matches) {
                const filtered = data.matches.filter(m => TARGET_LEAGUES.includes(m.competition.code));
                displayMatches(filtered);
            } else {
                throw new Error("No data");
            }
        } catch (error) {
            // محاولة أخيرة باستخدام وسيط AllOrigins إذا فشل الأول
            try {
                const altProxy = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                const altRes = await fetch(altProxy);
                const altJson = await altRes.json();
                const altData = JSON.parse(altJson.contents);
                const filtered = altData.matches.filter(m => TARGET_LEAGUES.includes(m.competition.code));
                displayMatches(filtered);
            } catch (e) {
                container.innerHTML = '<div class="loading" style="color:red">عذراً، الخادم لا يستجيب حالياً. يرجى إعادة المحاولة بعد لحظات.</div>';
            }
        }
    }

    function displayMatches(matches) {
        const container = document.getElementById('results');
        if (matches.length === 0) {
            container.innerHTML = '<h3>لا توجد مباريات نخبة في هذا التاريخ</h3>';
            return;
        }
        
        container.innerHTML = '';
        matches.forEach(m => {
            container.innerHTML += `
                <div class="match-card">
                    <span class="league-tag">${m.competition.name}</span>
                    <div style="padding:15px; font-weight:bold; font-size:1.1rem;">
                        ${m.homeTeam.shortName || m.homeTeam.name} VS ${m.awayTeam.shortName || m.awayTeam.name}
                    </div>
                    <div class="score">${m.score.fullTime.home ?? '-'} : ${m.score.fullTime.away ?? '-'}</div>
                    <div class="pred-bar">
                        <div class="pred-item">PRED: 1 / 2</div>
                        <div class="pred-item" style="color:var(--green)">+2.5</div>
                        <div class="pred-item" style="color:var(--blue)">GG: YES</div>
                    </div>
                </div>`;
        });
    }

    // البدء بجلب مباريات اليوم
    fetchMatches(0);
</script>
</body>
</html>
