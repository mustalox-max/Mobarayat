<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOBARAYAT - PRO</title>
    <style>
        :root { --yellow: #ffff00; --black: #000; --green: #2ecc71; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        
        .header { background: #000; color: #fff; padding: 30px; border-bottom: 8px solid var(--yellow); text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 3px; font-weight: 900; }
        
        .nav-tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; direction: ltr; max-width: 800px; margin-left: auto; margin-right: auto; }
        .tab-btn { flex: 1; border: 4px solid #000; background: #fff; padding: 15px; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .tab-btn.active { background: #000; color: #fff; }

        .match-card { background: #fff; border: 5px solid #000; margin-bottom: 20px; position: relative; box-shadow: 8px 8px 0px #000; max-width: 800px; margin-left: auto; margin-right: auto; overflow: hidden; }
        .league-tag { background: #000; color: #fff; padding: 6px; font-size: 0.8rem; font-weight: bold; text-align: center; display: block; }
        
        .teams-row { display: flex; align-items: center; justify-content: space-between; padding: 20px; text-align: center; }
        .team-name { flex: 1; font-size: 1.2rem; font-weight: 900; }
        .score-box { flex: 0.6; font-size: 3rem; font-weight: 900; background: #f9f9f9; border: 2px solid #eee; margin: 0 10px; }
        
        .pred-bar { background: var(--yellow); display: flex; border-top: 4px solid #000; direction: ltr; }
        .pred-item { flex: 1; padding: 12px; border-right: 2px solid #000; font-weight: 900; font-size: 1rem; text-align: center; color: #000; }
        .pred-item:last-child { border-right: none; }
    </style>
</head>
<body>

    <div class="header"><h1>MOBARAYAT</h1></div>

    <div class="nav-tabs">
        <button class="tab-btn" onclick="showDay('yesterday', this)">YESTERDAY</button>
        <button class="tab-btn active" onclick="showDay('today', this)">TODAY</button>
        <button class="tab-btn" onclick="showDay('tomorrow', this)">TOMORROW</button>
    </div>

    <div id="matches-container"></div>

<script>
    // --- قسم إدخال البيانات يدوياً كل ليلة ---
    const DATA = {
        yesterday: [
            { league: "EUROPA LEAGUE", home: "Man United", away: "FC Porto", score: "3 : 3", p1: "1/X", p2: "+2.5", p3: "GG" }
        ],
        today: [
            { league: "EUROPA LEAGUE", home: "Lazio", away: "Nice", score: "4 : 1", p1: "1", p2: "+2.5", p3: "GG" },
            { league: "PREMIER LEAGUE", home: "Liverpool", away: "Chelsea", score: "0 : 0", p1: "1/X", p2: "-3.5", p3: "NG" }
        ],
        tomorrow: [
            { league: "LA LIGA", home: "Real Madrid", away: "Villarreal", score: "VS", p1: "1", p2: "+2.5", p3: "GG" }
        ]
    };

    function showDay(day, btn) {
        const container = document.getElementById('matches-container');
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const matches = DATA[day];
        if(!matches || matches.length === 0) {
            container.innerHTML = '<h3 style="text-align:center">لا توجد مباريات مضافة لهذا اليوم.</h3>';
            return;
        }

        container.innerHTML = '';
        matches.forEach(m => {
            container.innerHTML += `
                <div class="match-card">
                    <div class="league-tag">${m.league}</div>
                    <div class="teams-row">
                        <div class="team-name">${m.home}</div>
                        <div class="score-box">${m.score}</div>
                        <div class="team-name">${m.away}</div>
                    </div>
                    <div class="pred-bar">
                        <div class="pred-item">PRED: ${m.p1}</div>
                        <div class="pred-item" style="color:red">${m.p2}</div>
                        <div class="pred-item" style="color:blue">${m.p3}</div>
                    </div>
                </div>`;
        });
    }

    // تشغيل مباريات اليوم تلقائياً
    showDay('today');
</script>
</body>
</html>
