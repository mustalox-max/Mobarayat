<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MOBARAYAT - ELITE</title>
    <style>
        :root { --black: #000; --yellow: #ffff00; --green: #2ecc71; --blue: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; margin: 0; padding: 10px; text-align: center; }
        .header { background: #000; color: #fff; padding: 25px; border-bottom: 8px solid var(--yellow); margin-bottom: 20px; }
        .nav-tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; direction: ltr; }
        .tab-btn { flex: 1; border: 3px solid #000; background: #fff; padding: 15px; font-weight: 900; cursor: pointer; }
        .tab-btn.active { background: #000; color: #fff; }
        .match-card { background: #fff; border: 4px solid #000; margin-bottom: 20px; text-align: center; overflow: hidden; }
        .league-tag { background: #000; color: #fff; padding: 5px; font-size: 0.8rem; display: block; }
        .score { font-size: 4rem; font-weight: 900; padding: 10px; border-top: 1px solid #eee; }
        .pred-bar { background: var(--yellow); display: flex; border-top: 4px solid #000; direction: ltr; }
        .pred-item { flex: 1; padding: 10px; border-right: 2px solid #000; font-weight: 900; }
        .pred-item:last-child { border-right: none; }
        .loading { padding: 50px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="header"><h1>MOBARAYAT</h1></div>

    <div class="nav-tabs">
        <button class="tab-btn" onclick="getData(-1, this)">YESTERDAY</button>
        <button class="tab-btn active" onclick="getData(0, this)">TODAY</button>
        <button class="tab-btn" onclick="getData(1, this)">TOMORROW</button>
    </div>

    <div id="main-content"></div>

<script>
    const API_TOKEN = "9547307bf1814e4ca4ec0da0a007b606";
    // الدوريات المطلوبة + البطولات الأوروبية
    const ELITE_IDS = ['PL', 'PD', 'BL1', 'SA', 'FL1', 'DED', 'BSA', 'PPL', 'CL', 'EL', 'EC'];

    async function getData(offset, btn) {
        const content = document.getElementById('main-content');
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const date = new Date();
        date.setDate(date.getDate() + offset);
        const dateStr = date.toISOString().split('T')[0];

        content.innerHTML = '<div class="loading">جاري تحديث البيانات...</div>';

        const apiTarget = `https://api.football-data.org/v4/matches?dateFrom=${dateStr}&dateTo=${dateStr}`;
        
        // محاولة الجلب باستخدام وسيطين مختلفين لضمان العمل
        const proxies = [
            `https://api.allorigins.win/get?url=${encodeURIComponent(apiTarget)}`,
            `https://thingproxy.freeboard.io/fetch/${apiTarget}`
        ];

        for (let proxy of proxies) {
            try {
                const response = await fetch(proxy, {
                    headers: proxy.includes('thingproxy') ? { 'X-Auth-Token': API_TOKEN } : {}
                });
                
                let data;
                if (proxy.includes('allorigins')) {
                    const json = await response.json();
                    data = JSON.parse(json.contents);
                } else {
                    data = await response.json();
                }

                if(data.matches) {
                    const filtered = data.matches.filter(m => ELITE_IDS.includes(m.competition.code));
                    renderUI(filtered);
                    return; // التوقف إذا نجح الجلب
                }
            } catch (e) {
                console.log("Proxy failed, trying next...");
            }
        }
        
        content.innerHTML = '<div class="loading" style="color:red">عذراً، هناك ضغط على الخادم حالياً. يرجى المحاولة بعد دقيقة.</div>';
    }

    function renderUI(matches) {
        const content = document.getElementById('main-content');
        if (matches.length === 0) {
            content.innerHTML = '<h3>لا توجد مباريات كبرى مبرمجة لهذا اليوم</h3>';
            return;
        }
        
        content.innerHTML = '';
        matches.forEach(m => {
            content.innerHTML += `
                <div class="match-card">
                    <div class="league-tag">${m.competition.name}</div>
                    <div style="padding:15px; font-size:1.2rem; font-weight:bold;">
                        ${m.homeTeam.shortName || m.homeTeam.name} VS ${m.awayTeam.shortName || m.awayTeam.name}
                    </div>
                    <div class="score">${m.score.fullTime.home ?? '-'} : ${m.score.fullTime.away ?? '-'}</div>
                    <div class="pred-bar">
                        <div class="pred-item">PRED: 1/X</div>
                        <div class="pred-item" style="color:var(--green)">+2.5</div>
                        <div class="pred-item" style="color:var(--blue)">GG: YES</div>
                    </div>
                </div>`;
        });
    }

    getData(0);
</script>
</body>
</html>
