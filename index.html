<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MOBARAYAT - LIVE</title>
    <style>
        :root { --black: #000; --yellow: #ffff00; --green: #2ecc71; --blue: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; margin: 0; padding: 10px; text-align: center; }
        .header { background: #000; color: #fff; padding: 25px; border-bottom: 8px solid var(--yellow); margin-bottom: 20px; }
        .nav-tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; direction: ltr; }
        .tab-btn { flex: 1; border: 3px solid #000; background: #fff; padding: 15px; font-weight: 900; cursor: pointer; }
        .tab-btn.active { background: #000; color: #fff; }
        .match-card { background: #fff; border: 4px solid #000; margin-bottom: 20px; text-align: center; position: relative; }
        .league-tag { background: #000; color: #fff; padding: 5px; font-size: 0.8rem; display: block; }
        .score { font-size: 4rem; font-weight: 900; padding: 10px; border-top: 1px solid #eee; color: #000; }
        .live-pulse { position: absolute; top: 10px; right: 10px; color: red; font-size: 0.7rem; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .pred-bar { background: var(--yellow); display: flex; border-top: 4px solid #000; direction: ltr; }
        .pred-item { flex: 1; padding: 10px; border-right: 2px solid #000; font-weight: 900; }
        .pred-item:last-child { border-right: none; }
        .loading { padding: 50px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="header"><h1>MOBARAYAT</h1></div>

    <div class="nav-tabs">
        <button class="tab-btn" onclick="run(-1, this)">YESTERDAY</button>
        <button class="tab-btn active" onclick="run(0, this)">TODAY</button>
        <button class="tab-btn" onclick="run(1, this)">TOMORROW</button>
    </div>

    <div id="results"></div>

<script>
    const KEY = "9547307bf1814e4ca4ec0da0a007b606";
    // إضافة EL لضمان ظهور الدوري الأوروبي فوراً
    const ELITE = ['PL', 'PD', 'BL1', 'SA', 'FL1', 'DED', 'BSA', 'PPL', 'CL', 'EL', 'EC'];

    async function run(offset, btn) {
        const box = document.getElementById('results');
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const d = new Date();
        d.setDate(d.getDate() + offset);
        const dateStr = d.toISOString().split('T')[0];

        box.innerHTML = '<div class="loading">جاري فحص نتائج الدوري الأوروبي...</div>';

        // محاولة الجلب المباشر أولاً بدون وسيط لسرعة البيانات الحية
        try {
            const url = `https://api.football-data.org/v4/matches?dateFrom=${dateStr}&dateTo=${dateStr}`;
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const json = await res.json();
            const data = JSON.parse(json.contents);

            if (data.matches && data.matches.length > 0) {
                const filtered = data.matches.filter(m => ELITE.includes(m.competition.code));
                render(filtered);
            } else {
                box.innerHTML = '<h3>لا توجد مباريات نخبة حالياً (تأكد من توقيت الـ API)</h3>';
            }
        } catch (e) {
            box.innerHTML = '<div class="loading" style="color:red">خطأ في الاتصال بالخادم. حاول تحديث الصفحة.</div>';
        }
    }

    function render(matches) {
        const box = document.getElementById('results');
        if (matches.length === 0) {
            box.innerHTML = '<h3>لم يتم العثور على مباريات الدوري الأوروبي (تحقق من مفتاح الـ API)</h3>';
            return;
        }
        
        box.innerHTML = '';
        matches.forEach(m => {
            const isLive = m.status === 'IN_PLAY' || m.status === 'PAUSED';
            box.innerHTML += `
                <div class="match-card">
                    ${isLive ? '<div class="live-pulse">LIVE</div>' : ''}
                    <span class="league-tag">${m.competition.name}</span>
                    <div style="padding:15px; font-weight:bold; font-size:1.1rem;">
                        ${m.homeTeam.shortName || m.homeTeam.name} VS ${m.awayTeam.shortName || m.awayTeam.name}
                    </div>
                    <div class="score">${m.score.fullTime.home ?? 0} : ${m.score.fullTime.away ?? 0}</div>
                    <div class="pred-bar">
                        <div class="pred-item">PRED: 1 / 2</div>
                        <div class="pred-item" style="color:var(--green)">+2.5</div>
                        <div class="pred-item" style="color:var(--blue)">GG: YES</div>
                    </div>
                </div>`;
        });
    }
    run(0);
</script>
</body>
</html>
