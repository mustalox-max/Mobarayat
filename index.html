<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOBARAYAT - ELITE</title>
    <style>
        :root { --yellow: #ffff00; --black: #000; --green: #2ecc71; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        
        /* القالب الجميل الذي أعجبك */
        .header { background: #000; color: #fff; padding: 30px; border-bottom: 8px solid var(--yellow); text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 3px; font-weight: 900; }
        
        .nav-tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; direction: ltr; max-width: 800px; margin-left: auto; margin-right: auto; }
        .tab-btn { flex: 1; border: 4px solid #000; background: #fff; padding: 15px; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .tab-btn.active { background: #000; color: #fff; }

        .matches-list { max-width: 800px; margin: 0 auto; }
        .match-card { background: #fff; border: 5px solid #000; margin-bottom: 20px; position: relative; box-shadow: 8px 8px 0px #000; }
        .league-tag { background: #000; color: #fff; padding: 6px; font-size: 0.8rem; font-weight: bold; text-align: center; display: block; }
        
        .teams-row { display: flex; align-items: center; justify-content: space-between; padding: 20px; text-align: center; }
        .team-name { flex: 1; font-size: 1.2rem; font-weight: 900; }
        .score-box { flex: 0.6; font-size: 3.5rem; font-weight: 900; background: #f9f9f9; border: 2px solid #eee; margin: 0 10px; }
        
        .pred-bar { background: var(--yellow); display: flex; border-top: 4px solid #000; direction: ltr; }
        .pred-item { flex: 1; padding: 12px; border-right: 2px solid #000; font-weight: 900; font-size: 1rem; text-align: center; }
        .pred-item:last-child { border-right: none; }
        
        .loading { font-size: 1.5rem; font-weight: bold; padding: 50px; text-align: center; }
        .error { color: red; padding: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header"><h1>MOBARAYAT</h1></div>

    <div class="nav-tabs">
        <button class="tab-btn" onclick="loadMatches(-1, this)">YESTERDAY</button>
        <button class="tab-btn active" onclick="loadMatches(0, this)">TODAY</button>
        <button class="tab-btn" onclick="loadMatches(1, this)">TOMORROW</button>
    </div>

    <div id="app" class="matches-list"></div>

<script>
    const API_KEY = "9547307bf1814e4ca4ec0da0a007b606";
    // الدوريات الكبرى + البطولات الأوروبية
    const LEAGUES = ['PL', 'PD', 'BL1', 'SA', 'FL1', 'DED', 'PPL', 'CL', 'EL', 'EC'];

    async function loadMatches(offset, btn) {
        const app = document.getElementById('app');
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const date = new Date();
        date.setDate(date.getDate() + offset);
        const dateStr = date.toISOString().split('T')[0];

        app.innerHTML = '<div class="loading">جاري جلب البيانات...</div>';

        // محاولة الجلب باستخدام وسيط AllOrigins
        const target = `https://api.football-data.org/v4/matches?dateFrom=${dateStr}&dateTo=${dateStr}`;
        const url = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;

        try {
            const res = await fetch(url);
            const json = await res.json();
            const data = JSON.parse(json.contents);

            if(data.matches && data.matches.length > 0) {
                const filtered = data.matches.filter(m => LEAGUES.includes(m.competition.code));
                render(filtered);
            } else {
                app.innerHTML = '<div class="loading">لا توجد مباريات كبرى لهذا التاريخ.</div>';
            }
        } catch (e) {
            app.innerHTML = '<div class="error">فشل الاتصال بالبيانات. تأكد من تحديث الصفحة.</div>';
        }
    }

    function render(matches) {
        const app = document.getElementById('app');
        if(matches.length === 0) {
            app.innerHTML = '<div class="loading">لا توجد مباريات متاحة حالياً.</div>';
            return;
        }
        app.innerHTML = '';
        matches.forEach(m => {
            app.innerHTML += `
                <div class="match-card">
                    <div class="league-tag">${m.competition.name}</div>
                    <div class="teams-row">
                        <div class="team-name">${m.homeTeam.shortName || m.homeTeam.name}</div>
                        <div class="score-box">${m.score.fullTime.home ?? 0}:${m.score.fullTime.away ?? 0}</div>
                        <div class="team-name">${m.awayTeam.shortName || m.awayTeam.name}</div>
                    </div>
                    <div class="pred-bar">
                        <div class="pred-item">PRED: 1/X</div>
                        <div class="pred-item" style="color:var(--green)">+2.5</div>
                        <div class="pred-item">GG: YES</div>
                    </div>
                </div>`;
        });
    }

    // التشغيل التلقائي لليوم
    loadMatches(0);
</script>
</body>
</html>
