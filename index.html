<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOBARAYAT - ELITE PREDICTIONS</title>
    <style>
        :root { --main-color: #ffff00; --bg: #fdfdfd; --card-bg: #ffffff; --text: #000; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: center; }
        .header-box { border: 6px solid #000; padding: 25px; margin-bottom: 25px; background: #fff; display: inline-block; width: 90%; max-width: 800px; }
        .header-box h1 { font-size: 3rem; margin: 0; font-weight: 900; letter-spacing: 2px; }
        
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; direction: ltr; max-width: 800px; margin-left: auto; margin-right: auto; }
        .tab-btn { flex: 1; border: 4px solid #000; background: #fff; padding: 12px 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 1rem; }
        .tab-btn.active { background: #000; color: #fff; }

        .matches-container { max-width: 850px; margin: 0 auto; }
        .match-card { background: var(--card-bg); border: 5px solid #000; margin-bottom: 25px; position: relative; overflow: hidden; box-shadow: 10px 10px 0px #000; }
        .league-header { background: #000; color: #fff; padding: 8px; font-size: 0.9rem; font-weight: bold; text-align: center; }
        
        .teams-flex { display: flex; align-items: center; justify-content: space-around; padding: 25px 10px; }
        .team-name { flex: 1; font-size: 1.3rem; font-weight: 900; }
        .score-box { flex: 0.5; font-size: 3.5rem; font-weight: 900; color: #000; }
        
        .prediction-zone { background: var(--main-color); border-top: 4px solid #000; display: flex; direction: ltr; }
        .pred-box { flex: 1; padding: 15px; border-right: 3px solid #000; font-weight: 900; font-size: 1.1rem; }
        .pred-box:last-child { border-right: none; }
        
        .loading-text { font-size: 1.5rem; font-weight: bold; padding: 50px; }
        .error-msg { color: red; border: 3px dashed red; padding: 20px; margin: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-box">
        <h1>MOBARAYAT</h1>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn" onclick="initLoader(-1, this)">YESTERDAY</button>
        <button class="tab-btn active" onclick="initLoader(0, this)">TODAY</button>
        <button class="tab-btn" onclick="initLoader(1, this)">TOMORROW</button>
    </div>

    <div id="app" class="matches-container">
        <div class="loading-text">جاري الاتصال بالسيرفر...</div>
    </div>

<script>
    const CONFIG = {
        KEY: "9547307bf1814e4ca4ec0da0a007b606",
        LEAGUES: ['PL', 'PD', 'BL1', 'SA', 'FL1', 'DED', 'BSA', 'PPL', 'CL', 'EL', 'EC']
    };

    async function initLoader(dayOffset, element) {
        const display = document.getElementById('app');
        if(element) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
        }

        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + dayOffset);
        const dateString = targetDate.toISOString().split('T')[0];

        display.innerHTML = '<div class="loading-text">جاري جلب مباريات النخبة...</div>';

        // محاولة جلب البيانات باستخدام وسيط موثوق
        const apiUrl = `https://api.football-data.org/v4/matches?dateFrom=${dateString}&dateTo=${dateString}`;
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents);

            if(data.matches && data.matches.length > 0) {
                const eliteMatches = data.matches.filter(m => CONFIG.LEAGUES.includes(m.competition.code));
                renderMatches(eliteMatches);
            } else {
                display.innerHTML = '<div class="loading-text">لا توجد مباريات في الدوريات الكبرى لهذا التاريخ.</div>';
            }
        } catch (error) {
            display.innerHTML = `
                <div class="error-msg">
                    فشل الاتصال التلقائي بالبيانات.<br>
                    تأكد من فتح الرابط الرسمي: <br>
                    <a href="https://mustalox-max.github.io/Mobarayat/">اضغط هنا لتنشيط الموقع</a>
                </div>`;
        }
    }

    function renderMatches(list) {
        const display = document.getElementById('app');
        if(list.length === 0) {
            display.innerHTML = '<div class="loading-text">لا توجد مباريات نخبة اليوم.</div>';
            return;
        }

        display.innerHTML = '';
        list.forEach(match => {
            display.innerHTML += `
                <div class="match-card">
                    <div class="league-header">${match.competition.name}</div>
                    <div class="teams-flex">
                        <div class="team-name">${match.homeTeam.shortName || match.homeTeam.name}</div>
                        <div class="score-box">${match.score.fullTime.home ?? 0}:${match.score.fullTime.away ?? 0}</div>
                        <div class="team-name">${match.awayTeam.shortName || match.awayTeam.name}</div>
                    </div>
                    <div class="prediction-zone">
                        <div class="pred-box">PRED: ${generatePred()}</div>
                        <div class="pred-box" style="color:green">+2.5</div>
                        <div class="pred-item" style="padding:15px; font-weight:bold;">LIVE</div>
                    </div>
                </div>`;
        });
    }

    function generatePred() {
        const outcomes = ["1/X", "2/X", "1", "2"];
        return outcomes[Math.floor(Math.random() * outcomes.length)];
    }

    // التشغيل عند فتح الصفحة
    initLoader(0);
</script>
</body>
</html>
