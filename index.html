<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MOBARAYAT ELITE - PRO</title>
    <style>
        :root { --black: #000; --yellow: #ffff00; --green: #008000; --blue: #0000ff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff; margin: 0; padding: 15px; text-align: center; }
        .header-box { border: 6px solid #000; padding: 20px; margin-bottom: 25px; background: #fff; }
        .header-box h1 { font-size: 3rem; margin: 0; font-weight: 900; letter-spacing: 2px; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; direction: ltr; }
        .tab-btn { border: 4px solid #000; background: #fff; padding: 12px 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background: #000; color: #fff; }
        .match-table { width: 100%; max-width: 850px; margin: 0 auto 30px auto; border: 6px solid #000; border-collapse: collapse; }
        .match-table td { border: 3px solid #000; padding: 15px; vertical-align: middle; }
        .league-title { background: #000; color: #fff; font-size: 0.9rem; font-weight: bold; }
        .score-case { font-size: 5rem; font-weight: 900; background: #fff; }
        .pred-case { background-color: var(--yellow) !important; padding: 0 !important; }
        .pred-flex { display: flex; width: 100%; direction: ltr; }
        .pred-item { flex: 1; padding: 15px; border-right: 3px solid #000; font-weight: 900; font-size: 1.3rem; }
        .pred-item:last-child { border-right: none; }
        .error-msg { color: red; font-weight: bold; padding: 50px; border: 2px dashed red; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header-box"><h1>MOBARAYAT</h1></div>

    <div class="nav-tabs">
        <button class="tab-btn" onclick="loadEliteMatches(-1, this)">YESTERDAY</button>
        <button class="tab-btn active" onclick="loadEliteMatches(0, this)">TODAY</button>
        <button class="tab-btn" onclick="loadEliteMatches(1, this)">TOMORROW</button>
    </div>

    <div id="matches-container"></div>

<script>
    const API_TOKEN = "9547307bf1814e4ca4ec0da0a007b606";
    // الدوريات المطلوبة: الخمس الكبرى + الهولندي + البلجيكي + البرتغالي + البطولات الأوروبية
    const TARGET_LEAGUES = ['PL', 'PD', 'BL1', 'SA', 'FL1', 'DED', 'BSA', 'PPL', 'CL', 'EL', 'EC'];

    async function loadEliteMatches(offset, btn) {
        const container = document.getElementById('matches-container');
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const date = new Date();
        date.setDate(date.getDate() + offset);
        const dateStr = date.toISOString().split('T')[0];

        // نظام التخزين المحلي (Cache) لضمان العمل أوتوماتيكياً وتوفير الطلبات
        const cacheData = localStorage.getItem('data_' + dateStr);
        if (cacheData) {
            render(JSON.parse(cacheData));
            return;
        }

        container.innerHTML = '<h2>جاري تحديث البيانات أوتوماتيكياً...</h2>';

        try {
            const response = await fetch(`https://api.football-data.org/v4/matches?dateFrom=${dateStr}&dateTo=${dateStr}`, {
                headers: { 'X-Auth-Token': API_TOKEN }
            });

            const data = await response.json();
            
            if (data.matches) {
                // الفلترة الأوتوماتيكية: نأخذ فقط الدوريات التي حددتها
                const eliteMatches = data.matches.filter(m => TARGET_LEAGUES.includes(m.competition.code));
                localStorage.setItem('data_' + dateStr, JSON.stringify(eliteMatches));
                render(eliteMatches);
            }
        } catch (error) {
            container.innerHTML = `
                <div class="error-msg">
                    <h3>خطأ في الاتصال (Connection Error)</h3>
                    <p>أنت تفتح الملف مباشرة من جهازك. لكي يشتغل "الأوتوماتيك" وتظهر المباريات، يجب رفع هذا الملف على استضافة.</p>
                    <p><b>الحل السريع:</b> ارفع الملف الآن على <a href="https://app.netlify.com/drop" target="_blank">Netlify Drop</a> وسيعمل فوراً!</p>
                </div>`;
        }
    }

    function render(matches) {
        const container = document.getElementById('matches-container');
        container.innerHTML = '';
        if (matches.length === 0) {
            container.innerHTML = '<h3>لا توجد مباريات في الدوريات الكبرى لهذا اليوم.</h3>';
            return;
        }
        matches.forEach(m => {
            container.innerHTML += `
                <table class="match-table">
                    <tr><td colspan="4" class="league-title">${m.competition.name}</td></tr>
                    <tr style="background:#f2f2f2">
                        <td style="width:15%; font-weight:bold;">${m.status === 'FINISHED' ? 'FT' : 'NS'}</td>
                        <td style="width:35%; font-size:1.5rem;"><b>${m.homeTeam.shortName || m.homeTeam.name}</b></td>
                        <td style="width:15%; font-weight:bold;">VS</td>
                        <td style="width:35%; font-size:1.5rem;"><b>${m.awayTeam.shortName || m.awayTeam.name}</b></td>
                    </tr>
                    <tr><td colspan="4" class="score-case">${m.score.fullTime.home ?? '-'} : ${m.score.fullTime.away ?? '-'}</td></tr>
                    <tr class="pred-case">
                        <td colspan="4">
                            <div class="pred-flex">
                                <div class="pred-item">2 / 1</div>
                                <div class="pred-item" style="color:var(--green)">+2.5</div>
                                <div class="pred-item" style="color:var(--blue)">B/NB : B</div>
                            </div>
                        </td>
                    </tr>
                </table>`;
        });
    }

    // تشغيل الجلب التلقائي لليوم الحالي
    loadEliteMatches(0);
</script>
</body>
</html>
