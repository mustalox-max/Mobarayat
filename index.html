<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MOBARAYAT - PRO</title>
    <style>
        :root { --black: #000; --yellow: #ffff00; }
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 20px; }
        .header { background: #000; color: #fff; padding: 20px; border-bottom: 5px solid var(--yellow); margin-bottom: 20px; }
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .btn { border: 3px solid #000; background: #fff; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        .btn.active { background: #000; color: #fff; }
        .card { background: #fff; border: 4px solid #000; margin: 10px auto; max-width: 600px; padding: 15px; }
        .pred { background: var(--yellow); border-top: 3px solid #000; margin-top: 10px; padding: 10px; display: flex; justify-content: space-around; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header"><h1>MOBARAYAT</h1></div>
    <div class="nav">
        <button class="btn" onclick="start(-1, this)">YESTERDAY</button>
        <button class="btn active" onclick="start(0, this)">TODAY</button>
        <button class="btn" onclick="start(1, this)">TOMORROW</button>
    </div>
    <div id="display"></div>

<script>
    const TOKEN = "9547307bf1814e4ca4ec0da0a007b606";
    const LEAGUES = ['PL', 'PD', 'BL1', 'SA', 'FL1', 'DED', 'BSA', 'CL', 'EL', 'EC'];

    async function start(offset, el) {
        const box = document.getElementById('display');
        if(el) { document.querySelectorAll('.btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
        
        const d = new Date();
        d.setDate(d.getDate() + offset);
        const s = d.toISOString().split('T')[0];
        
        box.innerHTML = "<h3>جاري جلب المباريات أوتوماتيكياً...</h3>";

        try {
            // استخدام وسيط (Proxy) لتفادي حظر المتصفح للملفات المحلية
            const api = `https://api.football-data.org/v4/matches?dateFrom=${s}&dateTo=${s}`;
            const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(api)}`);
            const j = await r.json();
            const data = JSON.parse(j.contents);

            if(data.matches) {
                const games = data.matches.filter(m => LEAGUES.includes(m.competition.code));
                render(games);
            }
        } catch(e) {
            box.innerHTML = "<h3 style='color:red'>يرجى فتح الرابط من المتصفح (وليس من الملف في جهازك)</h3>";
        }
    }

    function render(list) {
        const box = document.getElementById('display');
        box.innerHTML = list.length ? "" : "<h3>لا توجد مباريات كبرى اليوم.</h3>";
        list.forEach(m => {
            box.innerHTML += `
                <div class="card">
                    <small>${m.competition.name}</small>
                    <h3>${m.homeTeam.name} ${m.score.fullTime.home ?? '-'} : ${m.score.fullTime.away ?? '-'} ${m.awayTeam.name}</h3>
                    <div class="pred">
                        <span>PRED: 1/X</span>
                        <span>+2.5</span>
                        <span>GG: YES</span>
                    </div>
                </div>`;
        });
    }
    start(0);
</script>
</body>
</html>
